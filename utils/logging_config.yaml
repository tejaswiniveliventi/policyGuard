# utils/logging_config.yaml
logging:
  version: 1
  disable_existing_loggers: false

  log_dir: logs

  formatters:
    standard:
      format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
      datefmt: '%Y-%m-%d %H:%M:%S'
    
    detailed:
      format: '%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s'
      datefmt: '%Y-%m-%d %H:%M:%S'
    
    json:
      format: '{"timestamp": "%(asctime)s", "level": "%(levelname)s", "logger": "%(name)s", "message": "%(message)s"}'
      datefmt: '%Y-%m-%d %H:%M:%S'

  handlers:
    console:
      class: logging.StreamHandler
      level: DEBUG
      formatter: standard
      stream: ext://sys.stdout
    
    file:
      class: logging.handlers.RotatingFileHandler
      level: DEBUG
      formatter: detailed
      filename: logs/policyguard.log
      maxBytes: 10485760  # 10MB
      backupCount: 5
    
    error_file:
      class: logging.handlers.RotatingFileHandler
      level: ERROR
      formatter: detailed
      filename: logs/policyguard_errors.log
      maxBytes: 10485760  # 10MB
      backupCount: 5

  loggers:
    policyguard:
      level: DEBUG
      handlers:
        - console
        - file
        - error_file
      propagate: false
    
    policyguard.agents:
      level: DEBUG
      handlers:
        - console
        - file
      propagate: false
    
    policyguard.services:
      level: DEBUG
      handlers:
        - console
        - file
      propagate: false

  root:
    level: INFO
    handlers:
      - console
      - file